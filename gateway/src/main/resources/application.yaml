spring:
  application:
    name: Gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-service
              uri: lb://PRODUCT-SERVICE #http://localhost:8081
              predicates:
                - Path=/api/products/**

            - id: user-service
              uri: lb://USER-SERVICE #http://localhost:8082
              predicates:
                - Path=/api/users/**

            - id: order-service
              uri: lb://ORDER-SERVICE #http://localhost:8083
              predicates:
                - Path=/api/orders/**, /api/cart/**

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/


server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: TRACE